name: 🚀 Deploy a Producción

on:
  push:
    branches:
      - prod

jobs:
  deploy:
    name: Deploy en Windows Server
    runs-on: self-hosted

    steps:
      - name: 📥 Obtener último código
        uses: actions/checkout@v4

      - name: 📦 Preparar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: ✅ Validar Backend
        working-directory: ${{ github.workspace }}\backend
        shell: powershell
        env:
          SECRET_KEY: ci-temporary-secret-key-not-used-in-production
          DEBUG: "False"
          DATABASE_URL: "sqlite:///:memory:"
          SECURE_SSL_REDIRECT: "False"
          ALLOWED_HOSTS: "localhost,127.0.0.1"
        run: |
          C:\www\cooperadora\backend\venv\Scripts\python.exe -m pip install -r requirements.txt --quiet
          C:\www\cooperadora\backend\venv\Scripts\python.exe manage.py check
          C:\www\cooperadora\backend\venv\Scripts\python.exe manage.py test --noinput

      - name: ⚛️ Validar Frontend
        working-directory: ${{ github.workspace }}\frontend
        shell: powershell
        run: |
          pnpm install --frozen-lockfile
          pnpm build
          pnpm lint

      - name: 🚀 Publicar versión validada
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $deployRoot = "C:\www\cooperadora"
          $runnerIdentity = [System.Security.Principal.WindowsIdentity]::GetCurrent().Name
          Write-Host "Deploy ejecutado como: $runnerIdentity"

          $permissionProbe = Join-Path $deployRoot ".actions-write-test-$PID"
          try {
            [System.IO.File]::WriteAllText($permissionProbe, "ok")
            Remove-Item -LiteralPath $permissionProbe -Force
          } catch {
            throw "La cuenta '$runnerIdentity' no puede escribir en '$deployRoot'. Conceda permisos NTFS al usuario del servicio GitHub Actions Runner. Detalle: $($_.Exception.Message)"
          }

          function Invoke-CheckedRobocopy {
            param([string]$Source, [string]$Destination, [string[]]$ExtraArgs)
            & robocopy $Source $Destination /MIR /R:3 /W:5 @ExtraArgs
            $robocopyExitCode = $LASTEXITCODE
            if ($robocopyExitCode -ge 8) {
              throw "Robocopy falló al copiar '$Source' a '$Destination' (código $robocopyExitCode)."
            }
          }

          Invoke-CheckedRobocopy "${{ github.workspace }}\backend" "$deployRoot\backend" @("/XD", "venv", "media", "staticfiles", "__pycache__", "/XF", ".env")
          Invoke-CheckedRobocopy "${{ github.workspace }}\frontend" "$deployRoot\frontend" @("/XD", "node_modules")
          Set-Location C:\www\cooperadora\backend
          & .\venv\Scripts\python.exe manage.py migrate --noinput
          if ($LASTEXITCODE -ne 0) { throw "Fallaron las migraciones de Django." }
          & .\venv\Scripts\python.exe manage.py collectstatic --noinput
          if ($LASTEXITCODE -ne 0) { throw "Falló collectstatic." }
          & nssm restart cooperadora-backend
          if ($LASTEXITCODE -ne 0) {
            throw "La cuenta '$runnerIdentity' no tiene permiso para reiniciar el servicio 'cooperadora-backend'. Configure el runner con una cuenta autorizada."
          }

      - name: ✅ Health Check
        shell: powershell
        run: |
          Start-Sleep -Seconds 8
          try {
            $r = Invoke-WebRequest -Uri "http://localhost:8004/api/institution" -UseBasicParsing -TimeoutSec 10
            if ($r.StatusCode -eq 200) {
              Write-Host "✅ Servicio OK (HTTP $($r.StatusCode))"
            } else {
              Write-Error "❌ Respuesta inesperada: $($r.StatusCode)"
              exit 1
            }
          } catch {
            Write-Error "❌ El servicio no responde: $_"
            exit 1
          }
