name: 🚀 Deploy a Producción

on:
  push:
    branches:
      - prod

jobs:
  deploy:
    name: Deploy en Windows Server
    runs-on: self-hosted

    steps:
      - name: 📥 Obtener último código
        uses: actions/checkout@v4

      - name: 📦 Preparar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: ✅ Validar Backend
        working-directory: ${{ github.workspace }}\backend
        shell: powershell
        run: |
          C:\www\cooperadora\backend\venv\Scripts\python.exe -m pip install -r requirements.txt --quiet
          C:\www\cooperadora\backend\venv\Scripts\python.exe manage.py check
          C:\www\cooperadora\backend\venv\Scripts\python.exe manage.py test --noinput

      - name: ⚛️ Validar Frontend
        working-directory: ${{ github.workspace }}\frontend
        shell: powershell
        run: |
          pnpm install --frozen-lockfile
          pnpm build
          pnpm lint

      - name: 🚀 Publicar versión validada
        shell: powershell
        run: |
          robocopy "${{ github.workspace }}\backend" "C:\www\cooperadora\backend" /MIR /XD venv media staticfiles __pycache__ /XF .env
          if ($LASTEXITCODE -ge 8) { exit $LASTEXITCODE }
          robocopy "${{ github.workspace }}\frontend" "C:\www\cooperadora\frontend" /MIR /XD node_modules
          if ($LASTEXITCODE -ge 8) { exit $LASTEXITCODE }
          Set-Location C:\www\cooperadora\backend
          .\venv\Scripts\python.exe manage.py migrate --noinput
          .\venv\Scripts\python.exe manage.py collectstatic --noinput
          nssm restart cooperadora-backend

      - name: ✅ Health Check
        shell: powershell
        run: |
          Start-Sleep -Seconds 8
          try {
            $r = Invoke-WebRequest -Uri "http://localhost:8004/api/institution" -UseBasicParsing -TimeoutSec 10
            if ($r.StatusCode -eq 200) {
              Write-Host "✅ Servicio OK (HTTP $($r.StatusCode))"
            } else {
              Write-Error "❌ Respuesta inesperada: $($r.StatusCode)"
              exit 1
            }
          } catch {
            Write-Error "❌ El servicio no responde: $_"
            exit 1
          }
